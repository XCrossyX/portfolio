<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>W.GACEK - PORTFOLIO</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: white;
        background: black;
        overflow-x: hidden;
    }

    /* Gwiazdki */
    .stars {
        position: fixed;
        width: 100%;
        height: 100%;
        background: transparent url('https://i.imgur.com/7fNLQpM.png') repeat;
        background-size: 600px;
        z-index: -1;
        animation: moveStars 60s linear infinite;
    }

    @keyframes moveStars {
        from { background-position: 0 0; }
        to { background-position: -2000px 2000px; }
    }

    /* Sekcje */
    section {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
    }

    /* Szklany efekt */
    .glass {
        background: rgba(255, 255, 255, 0.1);
        padding: 20px 40px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.3);
    }

    /* Główne napisy */
    .title {
        font-size: 48px;
        font-weight: 700;
        margin-bottom: 20px;
    }

    .sub {
        font-size: 30px;
        margin-bottom: 10px;
    }

    .big {
        font-size: 70px;
        font-weight: 900;
        margin-top: 10px;
    }

    /* YouTube ikonka */
    .yt {
        margin-top: 20px;
        width: 80px;
        height: 80px;
        background: white;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.3s;
    }
    .yt:hover {
        transform: scale(1.1);
    }

    /* Sekcja kontakt */
    .contact-box {
        cursor: pointer;
        font-size: 40px;
        padding: 20px 40px;
    }

    /* Popup */
    #popup {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.3);
        padding: 40px 60px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        text-align: center;
        font-size: 28px;
    }

    #popup button {
        margin-top: 20px;
        padding: 10px 30px;
        font-size: 20px;
        cursor: pointer;
    }
</style>
</head>

<body>

<div class="stars"></div>

<!-- Sekcja 1 -->
<section>
    <div class="glass">
        <div class="title">WITAJ W ŚWIECIE W.GACEK</div>
    </div>

    <div class="sub">GLOBAL AD • BOT CREATOR</div>

    <div class="big">2026</div>

    <div class="big">PRO</div>

    <!-- YouTube -->
    <a href="https://www.youtube.com/@W.GACEKK" target="_blank">
        <div class="yt">
            ▶
        </div>
    </a>
</section>

<!-- Sekcja SODA STREAM -->
<section>
    <div class="big">SODA STREAM</div>
</section>

<!-- Sekcja KONTAKT -->
<section>
    <div class="glass contact-box" onclick="openPopup()">KONTAKT</div>
</section>

<!-- Popup -->
<div id="popup">
    KONTAKT: <br><br>
    <b>chiller.exe</b> NA DISCORD  
    <br><br>
    <button onclick="closePopup()">Zamknij</button>
</div>

<script>
function openPopup() {
    document.getElementById("popup").style.display = "block";
}
function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
